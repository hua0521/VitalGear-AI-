                    lang === l ? 'bg-white shadow-sm font-medium text-teal-700' : 'text-slate-500 hover:text-slate-700'

        <section class="relative overflow-hidden bg-slate-900 text-white py-20 sm:py-32">

          <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center text-center">

              <a href="#intro" class="bg-teal-500 hover:bg-teal-400 text-white px-8 py-3 rounded-full font-medium transition-all shadow-lg hover:shadow-teal-500/30 flex items-center gap-2">
                ${t.hero.cta} <i data-lucide="arrow-right" class="w-5 h-5"></i>
              </a>
            </div>
          </div>
        </section>

        <section id="intro" class="py-20 bg-white">
          <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h2 class="text-3xl font-bold text-slate-900 mb-6">${t.intro.title}</h2>
            <div class="w-16 h-1 bg-teal-500 mx-auto rounded mb-8"></div>
            <p class="text-lg text-slate-600 leading-relaxed text-justify sm:text-center">

        </section>

        <section class="py-20 bg-slate-50">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
              <h2 class="text-3xl font-bold text-slate-900 mb-4">${t.features.title}</h2>
              <div class="w-16 h-1 bg-teal-500 mx-auto rounded"></div>
            </div>
            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
              ${t.features.items.map(item => `
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                  <div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-xl flex items-center justify-center mb-6">

                  <span class="px-4 py-2 bg-slate-100 text-slate-700 rounded-full text-sm font-medium">

                `).join('')}

        <section class="py-20 bg-white">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            </div>
            
            <div class="relative max-w-5xl mx-auto">
              <div class="hidden lg:block absolute top-24 left-[10%] right-[10%] h-1 bg-slate-100 -z-10 rounded-full"></div>

                ${t.flow.steps.map((step, idx) => `
                  <div class="flow-step-container flex-1 relative transition-all duration-300 cursor-pointer group" data-idx="${idx}">
                    ${idx !== t.flow.steps.length - 1 ? `<div class="lg:hidden absolute left-[31px] top-16 bottom-[-2rem] w-0.5 bg-slate-100 -z-10"></div>` : ''}

                    <div class="flex flex-row lg:flex-col items-start lg:items-center gap-4 lg:gap-6 bg-white p-4 lg:p-6 rounded-2xl border border-transparent lg:hover:border-teal-100 lg:hover:shadow-lg transition-all">
                      <div class="step-icon-circle w-16 h-16 shrink-0 rounded-full flex items-center justify-center transition-colors duration-300 shadow-sm">
                        <i data-lucide="${step.icon}" class="w-7 h-7"></i>
                      </div>
                      
                      <div class="step-num hidden lg:flex w-8 h-8 rounded-full items-center justify-center text-sm font-bold absolute top-[80px] border-4 border-white transition-colors duration-300">
                        ${idx + 1}
                      </div>

                      <div class="flex-1 lg:text-center mt-1 lg:mt-6">
                        <div class="flex items-center gap-2 lg:justify-center mb-2">
                          <span class="lg:hidden text-sm font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded">Step ${idx + 1}</span>
                          <h3 class="step-title text-xl font-bold transition-colors">
                            ${step.title}
                          </h3>
                        </div>
                        <p class="text-slate-600 text-sm leading-relaxed">${step.text}</p>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </section>

        <section class="py-20 bg-slate-900 text-white">
          <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
              <h2 class="text-3xl font-bold mb-4">${t.comparison.title}</h2>
              <div class="w-16 h-1 bg-teal-500 mx-auto rounded"></div>
            </div>
            <div class="overflow-x-auto rounded-xl border border-slate-700 bg-slate-800 shadow-xl">
              <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                  <tr class="bg-slate-700/80">
                    <th class="p-5 sm:p-6 font-semibold border-b border-slate-600 w-1/3">${t.comparison.headers[0]}</th>
                    <th class="p-5 sm:p-6 font-semibold border-b border-slate-600 text-slate-400 w-1/3">${t.comparison.headers[1]}</th>
                    <th class="p-5 sm:p-6 font-semibold border-b border-slate-600 text-teal-400 w-1/3 bg-slate-700/40">${t.comparison.headers[2]}</th>
                  </tr>
                </thead>
                <tbody>
                  ${t.comparison.rows.map(row => `
                    <tr class="hover:bg-slate-700/50 transition-colors group">
                      <td class="p-5 sm:p-6 border-b border-slate-700/50 font-medium">${row[0]}</td>
                      <td class="p-5 sm:p-6 border-b border-slate-700/50 text-slate-400">${row[1]}</td>
                      <td class="p-5 sm:p-6 border-b border-slate-700/50 text-teal-300 font-medium bg-slate-700/20 group-hover:bg-slate-700/40 flex items-start sm:items-center gap-3">
                        <i data-lucide="check-circle-2" class="w-5 h-5 shrink-0 text-teal-500 mt-0.5 sm:mt-0"></i> ${row[2]}
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="py-20 bg-slate-50">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
              <h2 class="text-3xl font-bold text-slate-900 mb-4">${t.value.title}</h2>
              <div class="w-16 h-1 bg-teal-500 mx-auto rounded"></div>
            </div>
            <div class="grid sm:grid-cols-2 gap-6 max-w-4xl mx-auto">
              ${t.value.items.map(item => `
                <div class="flex gap-4 p-6 bg-white rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                  <div class="flex-shrink-0 mt-1">
                    <div class="w-8 h-8 rounded-full bg-teal-100 text-teal-600 flex items-center justify-center">
                      <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                    </div>
                  </div>
                  <div>
                    <h3 class="font-bold text-lg mb-2">${item.title}</h3>
                    <p class="text-slate-600 text-sm leading-relaxed">${item.text}</p>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="py-20 bg-white">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
              <h2 class="text-3xl font-bold text-slate-900 mb-4">${t.scenarios.title}</h2>
              <div class="w-16 h-1 bg-teal-500 mx-auto rounded"></div>
            </div>
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
              ${t.scenarios.items.map(item => `
                <div class="group p-8 rounded-2xl bg-slate-50 hover:bg-teal-600 transition-colors duration-300 shadow-sm">
                  <i data-lucide="${item.icon}" class="w-10 h-10 text-teal-500 group-hover:text-teal-200 mb-6 transition-colors"></i>
                  <h3 class="text-xl font-bold mb-3 text-slate-900 group-hover:text-white transition-colors">${item.title}</h3>
                  <p class="text-slate-600 group-hover:text-teal-50 transition-colors leading-relaxed">
                    ${item.text}
                  </p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="py-20 bg-teal-50 border-y border-teal-100">
          <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <i data-lucide="file-text" class="w-12 h-12 text-teal-600 mx-auto mb-6"></i>
            <h2 class="text-2xl font-bold text-slate-900 mb-6">${t.positioning.title}</h2>
            <p class="text-lg text-teal-900/80 leading-relaxed">
              ${t.positioning.text}
            </p>
          </div>
        </section>

        <section id="survey" class="py-24 bg-white relative overflow-hidden">
          <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
            <div class="bg-slate-900 rounded-3xl p-8 sm:p-12 shadow-2xl text-white overflow-hidden relative">
               <div class="absolute top-0 right-0 w-64 h-64 bg-teal-500/20 rounded-full mix-blend-screen filter blur-3xl"></div>
               
               <i data-lucide="qr-code" class="w-16 h-16 text-teal-400 mx-auto mb-6"></i>
               <h2 class="text-3xl font-bold mb-4">${t.survey.title}</h2>
               <p class="text-slate-300 mb-8 max-w-lg mx-auto">
                 ${t.survey.text}
               </p>
               
               <div class="flex flex-col items-center justify-center gap-8">
                 <div class="bg-white p-4 rounded-xl shadow-lg inline-block">
                   <img 
                      src="https://drive.google.com/thumbnail?id=10igCVoViNUdjWlIQvpJWkLnx7YVehLz6" 
                      alt="Survey QR Code"
                      class="w-36 h-36 object-contain"
                      style="image-rendering: crisp-edges;"
                   />
                 </div>
                 
                 <button
                   type="button"
                   onclick="window.open('${t.survey.url}', '_blank', 'noopener,noreferrer')"
                   class="bg-teal-500 hover:bg-teal-400 text-white px-8 py-3 rounded-full font-medium transition-all w-full sm:w-auto shadow-lg hover:shadow-teal-500/50"
                 >
                   ${t.survey.button}
                 </button>
               </div>
            </div>
          </div>
        </section>

        <footer class="bg-slate-900 border-t border-slate-800 text-slate-400 py-12">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-8 flex items-center gap-2 text-teal-500">
              <i data-lucide="camera" class="w-6 h-6"></i>
              <span class="font-bold text-lg">${t.nav.brand}</span>
            </div>
            <div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700/50">
              <h4 class="text-slate-300 font-semibold mb-2 flex items-center gap-2">
                <i data-lucide="shield-check" class="w-4 h-4"></i> ${t.disclaimer.title}
              </h4>
              <p class="text-sm leading-relaxed text-justify sm:text-left">
                ${t.disclaimer.text}
              </p>
            </div>
            <div class="mt-8 text-sm text-center sm:text-left">
              &copy; ${new Date().getFullYear()} VitalGear AI. All rights reserved.
            </div>
          </div>
        </footer>
      `;

      // 重新生成 Icons
      lucide.createIcons();

      // 重新綁定動畫與事件
      bindFlowEvents();
    }

    // 處理使用流程 (Flow) 的 hover 動畫邏輯
    function updateFlowStepsUI() {
      document.querySelectorAll('.flow-step-container').forEach((el) => {
        const idx = parseInt(el.getAttribute('data-idx'));
        const iconCircle = el.querySelector('.step-icon-circle');
        const stepNum = el.querySelector('.step-num');
        const title = el.querySelector('.step-title');

        if (idx === activeStep) {
          el.classList.add('scale-105');
          el.classList.remove('opacity-80');
          
          iconCircle.classList.add('bg-teal-600', 'text-white', 'shadow-teal-200', 'shadow-lg');
          iconCircle.classList.remove('bg-slate-50', 'text-teal-600', 'border', 'border-slate-200', 'group-hover:border-teal-300');
          
          if(stepNum) {
            stepNum.classList.add('bg-teal-500', 'text-white');
            stepNum.classList.remove('bg-slate-200', 'text-slate-500');
          }
          
          title.classList.add('text-teal-700');
          title.classList.remove('text-slate-800');
        } else {
          el.classList.remove('scale-105');
          el.classList.add('opacity-80');
          
          iconCircle.classList.remove('bg-teal-600', 'text-white', 'shadow-teal-200', 'shadow-lg');
          iconCircle.classList.add('bg-slate-50', 'text-teal-600', 'border', 'border-slate-200', 'group-hover:border-teal-300');
          
          if(stepNum) {
            stepNum.classList.remove('bg-teal-500', 'text-white');
            stepNum.classList.add('bg-slate-200', 'text-slate-500');
          }
          
          title.classList.remove('text-teal-700');
          title.classList.add('text-slate-800');
        }
      });
    }

    function bindFlowEvents() {
      document.querySelectorAll('.flow-step-container').forEach((el) => {
        el.addEventListener('mouseenter', () => {
          activeStep = parseInt(el.getAttribute('data-idx'));
          updateFlowStepsUI();
        });
      });
      // 初始化第一次狀態
      updateFlowStepsUI();
    }

    // 初始化應用
    render();
  </script>
</body>
</html>
